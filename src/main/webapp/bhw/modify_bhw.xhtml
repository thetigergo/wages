<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
 
        <ui:composition template="/WEB-INF/template.xhtml" >

            <ui:define name="top">
                <c:if test="#{onlined.userOnline != null}">
                    <ui:include src="/WEB-INF/bhwmenu.xhtml"/>
                </c:if>
            </ui:define>

            <ui:define name="content">

                <c:if test="#{onlined.userOnline != null}">

                    <h:form id="frmed">
                        <p:growl id="msgs" showDetail="true" />

                        <p:panel id="basic" header="MODIFY/REMOVE PAYROLL" style="width: 1283px;">

                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tbody>
                                    <tr>
                                        <td width="55%">
                                            <table border="0" cellpadding="0" cellspacing="5">
                                                <tbody>
                                                    <tr>
                                                        <td>District</td><td> : </td><td>
                                                            #{bhwModify.district}
                                                        </td>
                                                    </tr>
                                                    <tr>
                                                        <td>Barangay</td><td> : </td>
                                                        <td>
                                                            #{bhwModify.barangay}
                                                        </td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </td>
                                        <td width="30%">
                                            <table border="0" cellpadding="5" cellspacing="0" width="0">
                                                <tbody>
                                                    <tr>
                                                        <td>Control #</td><td> : </td>
                                                        <td colspan="3">
                                                            <p:selectOneMenu value="#{bhwModify.ctrlNo}" >
                                                                <p:ajax listener="#{bhwModify.retrieveJOs}" update="basic" />
                                                                <f:selectItem itemValue="." itemLabel="&lt;&lt;Select Ctrl #&gt;&gt;"/>
                                                                <f:selectItems value="#{bhwModify.controls}"/>
                                                            </p:selectOneMenu>
                                                        </td>
                                                    </tr>
                                                    <tr>
                                                        <td colspan="3">
                                                            <p:commandButton value="Print Payroll" action="#{jasperController.viewPayroll(bhwModify.ctrlNo, bhwModify.render, 'bhw/', false)}" ajax="false" icon="ui-icon-document"/>
                                                        </td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                            
                            <div style="width: 100%;overflow-x: auto;white-space: nowrap;">
                                <div style="width: 1467px;">
                                    <p:dataTable var="worker"
                                                 value="#{bhwModify.wages}"
                                                 rows="4"
                                                 paginator="true"
                                                 paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                                 id="lamesa">
                                        <p:column headerText="Name" width="200" style="vertical-align: middle;">
                                            <h:outputText value="#{worker.worker}" />
                                        </p:column>
                                        <p:column headerText="Occupation" width="180" style="vertical-align: middle; text-align: center;">
                                            <h:outputText value="#{worker.jobs}" />
                                        </p:column>
                                        <p:column headerText="Date From" width="90" style="text-align: center;">
                                            <h:outputText value="#{worker.dateFr}">
                                                <f:convertDateTime pattern="MM/dd/yyyy" timeZone="GMT+8"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="Date To" width="90" style="text-align: center;">
                                            <h:outputText value="#{worker.dateTo}">
                                                <f:convertDateTime pattern="MM/dd/yyyy" timeZone="GMT+8"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="Days Absent" width="50" style="text-align: center;">
                                            <h:outputText value="#{worker.days}">
                                                <f:convertNumber pattern="#0.00;(#0.00)"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="Rate" width="50" style="text-align: right;">
                                            <h:outputText value="#{worker.rate}" >
                                                <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="Gross" width="70" style="text-align: right;">
                                            <h:outputText value="#{worker.gross}" >
                                                <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="Undertime" width="50" style="text-align: right;">
                                            <h:outputText value="#{worker.undertime} minute/s" />
                                        </p:column>
                                        <p:column headerText="Deduction" width="50" style="text-align: right;">
                                            <h:outputText value="#{worker.deduction}">
                                                <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="Pag-Ibig" width="50" style="text-align: right;">
                                            <h:outputText value="#{worker.pagIbig}">
                                                <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="SSS-Prem" width="50" style="text-align: right;">
                                            <h:outputText value="#{worker.SSSPrem}">
                                                <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="Additional" width="70" style="text-align: right;" >
                                            <h:outputText value="#{worker.bunos}" >
                                                <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="Net Amount" width="100" style="text-align: right;">
                                            <h:outputText value="#{worker.netAmount}">
                                                <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column width="25">
                                            <f:facet name="header">
                                                <img src="${resource['img/edit.png']}"/>
                                            </f:facet>
                                            <p:commandButton value="" action="#{bhwModify.onEditWork(worker.workID)}" 
                                                             update="@([id$=ngalan]) @([id$=jobs]) @([id$=datefr]) @([id$=dateto]) @([id$=days]) @([id$=rate]) @([id$=minuta]) @([id$=pagibig]) @([id$=sss]) @([id$=dugang1]) @([id$=dugang2]) @([id$=dugang3])"/>
                                        </p:column>
                                        <p:column width="25">
                                            <f:facet name="header">
                                                <img src="${resource['img/erase.png']}"/>
                                            </f:facet>
                                            <p:commandButton value="" action="#{bhwModify.onEraseJOs(worker.workID)}" onclick="return confirm('Are you sure you want to remove this J.O.?');" ajax="false"/>
                                        </p:column>
                                        <p:columnGroup type="footer">
                                            <p:row>
                                                <p:column style="text-align:right" footerText="" />
                                                <p:column style="text-align:right" footerText="" />
                                                <p:column style="text-align:right" footerText="" />
                                                <p:column colspan="2" style="text-align:right; font-weight: bold; color: navy;" footerText="T O T A L" />
                                                <p:column colspan="2" style="text-align:right; font-weight: bold; color: navy;" footerText="#{bhwModify.totalGross}"/>
                                                <p:column colspan="2" style="text-align:right; font-weight: bold; color: navy;" footerText="#{bhwModify.totalDeduct}"/>
                                                <p:column style="text-align:right; font-weight: bold; color: navy;" footerText="#{bhwModify.totalHDMF}"/>
                                                <p:column style="text-align:right; font-weight: bold; color: navy;" footerText="#{bhwModify.totalSSS}"/>
                                                <p:column style="text-align:right; font-weight: bold; color: navy;" footerText="#{bhwModify.totalBunos}"/>
                                                <p:column style="text-align:right; font-weight: bold; color: navy;" footerText="#{bhwModify.totalWage}"/>
                                                <p:column style="text-align:right" footerText="" />
                                                <p:column style="text-align:right" footerText="" />
                                            </p:row>
                                        </p:columnGroup>
                                    </p:dataTable>
                                </div>
                            </div>

                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tbody>
                                    <tr>
                                        <td width="30%">
                                            <h:panelGrid columns="3" cellpadding="5" border="0">
                                                <p:outputLabel value="Name"/>
                                                <p:outputLabel value=" : "/>
                                                <p:outputLabel value="#{bhwModify.worker}" id="ngalan"/>

                                                <p:outputLabel value="Occupation"/>
                                                <p:outputLabel value=" : "/>
                                                <p:outputLabel value="#{bhwModify.jobDesc}" id="jobs"/>

                                                <p:outputLabel value="Days Absent"/>
                                                <p:outputLabel value=" : "/>
                                                <p:inputText value="#{bhwModify.days}" size="10" maxlength="10" style="text-align: right;" id="days" disabled="true">
                                                    <f:convertNumber pattern="#0.00;(#0.00)"/>
                                                </p:inputText>

                                                <p:outputLabel value="Rate"/>
                                                <p:outputLabel value=" : "/>
                                                <p:inputText value="#{bhwModify.rate}" size="10" maxlength="10" style="text-align: right;" id="rate">
                                                    <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                                </p:inputText>

                                                <p:outputLabel value="Undertime"/>
                                                <p:outputLabel value=" : "/>
                                                <h:panelGrid columns="2" cellpadding="0" cellspacing="0">
                                                    <p:inputText   value="#{bhwModify.minutes}" size="10" maxlength="10" style="text-align: right;" id="minuta" disabled="true"/>
                                                    <p:outputLabel value="&nbsp;&nbsp;&nbsp;mins"/>
                                                </h:panelGrid>

                                                <p:outputLabel id="dugang1" value="Additional" style="color: #{bhwModify.render ? '#555555' : 'gainsboro'}"/>
                                                <p:outputLabel id="dugang2" value=" : " style="color: #{bhwModify.render ? '#555555' : 'gainsboro'}"/>
                                                <p:inputText   id="dugang3" value="#{bhwModify.bunos}" size="10" maxlength="10" style="text-align: right;" disabled="#{!bhwModify.render}" >
                                                    <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                                </p:inputText>
                                            </h:panelGrid>

                                            <h:panelGrid cellpadding="0" cellspacing="0">
                                                <p:commandButton value="Post/Save" actionListener="#{bhwModify.updateEntry}" ajax="false"/>
                                            </h:panelGrid>
                                        </td>
                                        <td width="20">
                                            <p:spacer />
                                        </td>
                                        <td width="50%">
                                            <table border="0" width="100%">
                                                <tbody>
                                                    <tr>
                                                        <td>
                                                            <table border="0" width="100%">
                                                                <tbody>
                                                                    <tr>
                                                                        <td width="45%" valign="top">
                                                                            <h:panelGrid columns="3" cellpadding="0" cellspacing="3">
                                                                                <p:outputLabel value="CERTIFIED BY"/>
                                                                                <p:outputLabel value="&nbsp;:&nbsp;"/>
                                                                                <p:inputText   value="#{bhwModify.certify1}"/>
                                                                                <p:outputLabel value="Designation"/>
                                                                                <p:outputLabel value="&nbsp;:&nbsp;"/>
                                                                                <p:inputText   value="#{bhwModify.rank1}"/>
                                                                            </h:panelGrid>
                                                                        </td>
                                                                        <td style="text-align: justify; font-size: 11px; color: blue;">
                                                                            <p:outputLabel value="1. HEREBY CERTIFY that each person whose name appears on this roll rendered service as indicated and for the time stated."/>
                                                                        </td>
                                                                    </tr>
                                                                </tbody>
                                                            </table>

                                                            <br/>
                                                            <br/>
                                                            <table border="0" width="100%">
                                                                <tbody>
                                                                    <tr>
                                                                        <td width="45%" valign="top">
                                                                            <h:panelGrid columns="3" cellpadding="0" cellspacing="3">
                                                                                <p:outputLabel value="CERTIFIED BY"/>
                                                                                <p:outputLabel value="&nbsp;:&nbsp;"/>
                                                                                <p:inputText   value="#{bhwModify.certify2}"/>
                                                                                <p:outputLabel value="Designation"/>
                                                                                <p:outputLabel value="&nbsp;:&nbsp;"/>
                                                                                <p:inputText   value="#{bhwModify.rank2}"/>
                                                                            </h:panelGrid>                                
                                                                        </td>
                                                                        <td style="text-align: justify; font-size: 11px; color: blue;" valign="top">
                                                                            <p:outputLabel value="2. I CERTIFY on my official oath that I have this day of #{bhwModify.dateNow} paid in cash to each man whose name appears on the above roll, the amount set opposite his name, he having presented himself, established his identity, and affixed his signature or thumb mark on the space provided. Therefore unpaid services are indicating red ink through the column &quot;Amount Paid&quot;. Special Disbursing Officer, Paymaster or Municipal Treasurer ______________."/>
                                                                        </td>
                                                                    </tr>
                                                                </tbody>
                                                            </table>
                                                        </td>
                                                    </tr>
                                                    <tr>
                                                        <td valign="bottom" align="right">
                                                            <p:commandButton value="Update Officers" actionListener="#{bhwModify.updateOfficer}" update="msgs" ajax="false"/>
                                                        </td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>

                        </p:panel>

                    </h:form>

                </c:if>

                <c:if test="#{onlined.userOnline == null}">
                    <div align="center" style="margin-top: 150px;">
                        <h1 style="font-size: 75px; color: white;">You are not LOG-ON!</h1>
                    </div>
                </c:if>

            </ui:define>

        </ui:composition>

    </body>
</html>
