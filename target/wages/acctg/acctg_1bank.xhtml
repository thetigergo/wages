<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

    <body>

        <ui:composition template="/WEB-INF/template.xhtml" >

            <ui:define name="top">
                <c:if test="#{onlined.userOnline != null}">
                    <ui:include src="/WEB-INF/auditmenu.xhtml"/>
                </c:if>
            </ui:define>

            <ui:define name="content">

                <c:if test="#{onlined.userOnline != null}">

                    <f:view>
                        <h:form>
                            <p:growl id="messages" showSummary="true" showDetail="true" globalOnly="true" />

                            <p:panel id="basic" header="BANK ACCOUNT CONSOLE" style="width: 550px;">

                                <h:panelGrid columns="3" cellpadding="5" border="0">
                                    <p:outputLabel value="J.O. Name"/><p:outputLabel value=":"/>
                                    <p:selectOneMenu value="#{bankBean.workerID}">
                                        <f:selectItems value="#{bankBean.workers}"/>
                                    </p:selectOneMenu>
                                    <p:outputLabel value="Bank Acct"/><p:outputLabel value=":"/><p:inputMask value="#{bankBean.bankAcct}" mask="9-99999-999-9" size="15" maxlength="13"/>
                                </h:panelGrid>

                                <br/>
                                <br/>
                                <table border="0" width="100%" cellspacing="1" cellpadding="1">
                                    <tbody>
                                        <tr>
                                            <td>
                                                &nbsp;
                                            </td>
                                            <td align="right">
                                                <p:commandButton value="Update" actionListener="#{bankBean.updateJOs}" update="messages"/>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>

                            </p:panel>

                            <p:messages id="msgs" showDetail="true" closable="true" />

                        </h:form>
                    </f:view>

                </c:if>

                <c:if test="#{onlined.userOnline == null}">
                    <div align="center" style="margin-top: 150px;">
                        <h1 style="font-size: 75px; color: white;">You are not LOG-ON!</h1>
                    </div>
                </c:if>

            </ui:define>

        </ui:composition>

    </body>
</html>
