<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <body>
 
        <ui:composition template="/WEB-INF/template.xhtml">

            <ui:define name="top">
                <c:if test="#{onlined.userOnline != null}"><ui:include src="/WEB-INF/jobmenu.xhtml"/></c:if>
            </ui:define>

            <ui:define name="content">

                <c:if test="#{onlined.userOnline != null}">

                    <h:form id="porma">
                        <p:growl id="msgs" showDetail="true" />

                        <p:panel id="basic" header="PAYROLL ADDITIONAL - C/A" style="width: 1283px;">
                            
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tbody>
                                    <tr>
                                        <td width="55%">
                                            <table border="0" cellpadding="0" cellspacing="5">
                                                <tbody>
                                                    <tr>
                                                        <td>Agency</td><td> : </td><td><h:outputLabel value="#{addPAYBean.opesina}" id="office"/></td>
                                                    </tr>
                                                    <tr>
                                                        <td>Project</td><td> : </td><td>#{addPAYBean.proyek2}</td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </td>
                                        <td width="30%">
                                            <table border="0" cellpadding="5" cellspacing="0" width="0">
                                                <tbody>
                                                    <tr>
                                                        <td>Control #</td><td> : </td>
                                                        <td colspan="3">
                                                            <p:selectOneMenu value="#{addPAYBean.ctrlNo}" >
                                                                <p:ajax listener="#{addPAYBean.onCtrlChangeReload}" update="basic"/>
                                                                <f:selectItem itemValue="." itemLabel="&lt;&lt;Select Ctrl #&gt;&gt;"/>
                                                                <f:selectItems value="#{addPAYBean.controls}"/>
                                                            </p:selectOneMenu>
                                                        </td>
                                                    </tr>
                                                    <tr>
                                                        <td>Payroll</td>
                                                        <td> : </td>
                                                        <td>
                                                            <p:calendar value="#{addPAYBean.payFr}" id="datefr" pattern="MM/dd/yyyy" size="10" maxlength="10" mindate="#{addPAYBean.payFr}" maxdate="#{addPAYBean.payFr}" readonly="true" timeZone="GMT+8"/>
                                                        </td>
                                                        <td> TO </td>
                                                        <td><p:calendar value="#{addPAYBean.payTo}" id="dateto" pattern="MM/dd/yyyy" size="10" maxlength="10" mindate="#{addPAYBean.payTo}" maxdate="#{addPAYBean.payTo}" readonly="true" timeZone="GMT+8"/></td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </td>
                                        <td width="15%" valign="top">
                                            <p:commandButton value="Print Payroll" action="#{jasperController.viewPayroll(addPAYBean.ctrlNo, addPAYBean.render, 'pays/', false)}" ajax="false" icon="ui-icon-document"/>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>

                            <div style="width: 100%;overflow-x: auto;white-space: nowrap;">
                                <div style="width: 1375px;">
                                    <p:dataTable id="doers"
                                                 var="worker"
                                                 value="#{addPAYBean.wages}"
                                                 rows="4"
                                                 paginator="true"
                                                 paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}">
                                        <p:column headerText="Name" width="200" style="vertical-align: middle;">
                                            <h:outputText value="#{worker.worker}" />
                                        </p:column>
                                        <p:column headerText="Occupation" width="180" style="vertical-align: middle; text-align: center;">
                                            <h:outputText value="#{worker.jobs}" />
                                        </p:column>
                                        <p:column headerText="Date From" width="90" style="text-align: center;">
                                            <h:outputText value="#{worker.dateFr}">
                                                <f:convertDateTime pattern="MM/dd/yyyy" timeZone="GMT+8"/>
                                            </h:outputText>
                                        </p:column>

                                        <p:column headerText="Date To" width="90" style="text-align: center;">
                                            <h:outputText value="#{worker.dateTo}">
                                                <f:convertDateTime pattern="MM/dd/yyyy" timeZone="GMT+8"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="Days Worked" width="50" style="text-align: center;">
                                            <h:outputText value="#{worker.days}">
                                                <f:convertNumber pattern="#0.00;(#0.00)"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="Rate" width="50" style="text-align: right;">
                                            <h:outputText value="#{worker.rate}" >
                                                <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="Gross" width="70" style="text-align: right;">
                                            <h:outputText value="#{worker.gross}" >
                                                <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="Undertime" width="50" style="text-align: right;">
                                            <h:outputText value="#{worker.undertime} minute/s" />
                                        </p:column>
                                        <p:column headerText="Deduction" width="50" style="text-align: right;">
                                            <h:outputText value="#{worker.deduction}">
                                                <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="Pag-Ibig" width="50" style="text-align: right;">
                                            <h:outputText value="#{worker.pagIbig}">
                                                <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="SSS-Prem" width="50" style="text-align: right;">
                                            <h:outputText value="#{worker.SSSPrem}">
                                                <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="Additional" width="70" style="text-align: right;" >
                                            <h:outputText value="#{worker.bunos}" >
                                                <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:column headerText="Net Amount" width="100" style="text-align: right;">
                                            <h:outputText value="#{worker.netAmount}">
                                                <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                            </h:outputText>
                                        </p:column>
                                        <p:columnGroup type="footer">
                                            <p:row>
                                                <p:column style="text-align:right" footerText="" />
                                                <p:column style="text-align:right" footerText="" />
                                                <p:column style="text-align:right" footerText="" />
                                                <p:column colspan="2" style="text-align:right; font-weight: bold; color: navy;" footerText="T O T A L" />
                                                <p:column colspan="2" style="text-align:right; font-weight: bold; color: navy;" footerText="#{addPAYBean.totalGross}"/>
                                                <p:column colspan="2" style="text-align:right; font-weight: bold; color: navy;" footerText="#{addPAYBean.totalDeduct}"/>
                                                <p:column style="text-align:right; font-weight: bold; color: navy;" footerText="#{addPAYBean.totalHDMF}"/>
                                                <p:column style="text-align:right; font-weight: bold; color: navy;" footerText="#{addPAYBean.totalSSS}"/>
                                                <p:column style="text-align:right; font-weight: bold; color: navy;" footerText="#{addPAYBean.totalBunos}"/>
                                                <p:column style="text-align:right; font-weight: bold; color: navy;" footerText="#{addPAYBean.totalWage}"/>
                                            </p:row>
                                        </p:columnGroup>
                                    </p:dataTable>
                                </div>
                            </div>
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tbody>
                                    <tr>
                                        <td width="30%">
                                            <h:panelGrid columns="3" cellpadding="5">
                                                <p:outputLabel value="Job Order #"/>
                                                <p:outputLabel value=" : "/>
                                                <p:selectOneMenu value="#{addPAYBean.jobOrder}" id="jobno">
                                                    <p:ajax listener="#{addPAYBean.onJOChange}" update="worker" />
                                                    <f:selectItem itemValue="." itemLabel="&lt;&lt;Select J.O. #&gt;&gt;"/>
                                                    <f:selectItems value="#{addPAYBean.jobOrderNos}"/>
                                                </p:selectOneMenu>

                                                <p:outputLabel value="Name"/>
                                                <p:outputLabel value=" : "/>
                                                <p:selectOneMenu value="#{addPAYBean.workerID}" id="worker">
                                                    <p:ajax listener="#{addPAYBean.onWorkerChange}" update="jobs rate" />
                                                    <f:selectItem itemValue="." itemLabel="&lt;&lt;Select JO's&gt;&gt;"/>
                                                    <f:selectItems value="#{addPAYBean.workers}"/>
                                                </p:selectOneMenu>

                                                <p:outputLabel value="Occupation"/>
                                                <p:outputLabel value=" : "/>
                                                <p:inputText value="#{addPAYBean.jobs}" id="jobs" readonly="true"/>

                                                <p:outputLabel value="Date Cover"/>
                                                <p:outputLabel value=" : "/>
                                                <h:panelGrid columns="3" cellpadding="0" cellspacing="0">
                                                    <p:calendar value="#{addPAYBean.dateFr}" pattern="MM/dd/yyyy" size="10" maxlength="10" id="range1" timeZone="GMT+8">
                                                        <p:ajax event="dateSelect" listener="#{addPAYBean.onDateFrSelect}" update="days pagibig" />
                                                    </p:calendar>
                                                    <p:outputLabel value="&nbsp;:&nbsp;"/>
                                                    <p:calendar value="#{addPAYBean.dateTo}" pattern="MM/dd/yyyy" size="10" maxlength="10" id="range2" timeZone="GMT+8">
                                                        <p:ajax event="dateSelect" listener="#{addPAYBean.onDateToSelect}" update="days pagibig" />
                                                    </p:calendar>
                                                </h:panelGrid>

                                                <p:outputLabel value="Working Days"/>
                                                <p:outputLabel value=" : "/>
                                                <p:inputText   value="#{addPAYBean.days}" size="10" maxlength="10" style="text-align: right;" id="days">
                                                    <f:convertNumber pattern="#0.00;(#0.00)"/>
                                                </p:inputText>

                                                <p:outputLabel value="Rate"/>
                                                <p:outputLabel value=" : "/>
                                                <p:inputText   value="#{addPAYBean.rate}" size="10" maxlength="10" style="text-align: right;" id="rate">
                                                    <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                                </p:inputText>

                                                <p:outputLabel value="Undertime"/>
                                                <p:outputLabel value=" : "/>
                                                <h:panelGrid columns="2" cellpadding="0" cellspacing="0">
                                                    <p:inputText   value="#{addPAYBean.minutes}" size="10" maxlength="10" style="text-align: right;" id="minuta"/>
                                                    <p:outputLabel value="&nbsp;&nbsp;&nbsp;mins"/>
                                                </h:panelGrid>

                                                <p:outputLabel value="PAG-IBIG"/>
                                                <p:outputLabel value=" : "/>
                                                <p:inputText   value="#{addPAYBean.pagIbig}"  size="10" maxlength="10" style="text-align: right;" id="pagibig" disabled="#{addPAYBean.isSenior}">
                                                    <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                                </p:inputText>

                                                <p:outputLabel value="SSS Prem"/>
                                                <p:outputLabel value=" : "/>
                                                <p:inputText   value="#{addPAYBean.SSSPrem}"  size="10" maxlength="10" style="text-align: right;" id="sssprem" disabled="#{addPAYBean.isSenior}">
                                                    <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                                </p:inputText>

                                                <p:outputLabel id="dugang1" value="Additional" style="color: #{addPAYBean.render ? '#555555' : 'gainsboro'}"/>
                                                <p:outputLabel id="dugang2" value=" : " style="color: #{addPAYBean.render ? '#555555' : 'gainsboro'}"/>
                                                <p:inputText   id="dugang3" value="#{addPAYBean.bunos}" size="10" maxlength="10" style="text-align: right;" disabled="#{!addPAYBean.render}" >
                                                    <f:convertNumber pattern="#,##0.00;(#,##0.00)"/>
                                                </p:inputText>
                                            </h:panelGrid>

                                            <h:panelGrid cellpadding="0" cellspacing="0">
                                                <p:commandButton value="Post J.O." actionListener="#{addPAYBean.saveEntry}" ajax="false"/>
                                            </h:panelGrid>
                                        </td>
                                        <td width="20">
                                            <p:spacer />
                                        </td>
                                        <td width="50%">
                                            <table border="0" width="100%">
                                                <tbody>
                                                    <tr>
                                                        <td>
                                                            <table border="0" width="100%">
                                                                <tbody>
                                                                    <tr>
                                                                        <td width="45%" valign="top">
                                                                            <h:panelGrid columns="3" cellpadding="0" cellspacing="3">
                                                                                <p:outputLabel value="CERTIFIED BY"/>
                                                                                <p:outputLabel value="&nbsp;:&nbsp;"/>
                                                                                <p:inputText   value="#{addPAYBean.certify1}"/>
                                                                                <p:outputLabel value="Designation"/>
                                                                                <p:outputLabel value="&nbsp;:&nbsp;"/>
                                                                                <p:inputText   value="#{addPAYBean.rank1}"/>
                                                                            </h:panelGrid>
                                                                        </td>
                                                                        <td style="text-align: justify; font-size: 11px; color: blue;">
                                                                            <!--p:outputLabel value="CERTIFICATION - This is to certify that the above mentioned job order employees have rendered services in the #addPAYBean.opesina} on the date stated."/-->
                                                                            <p:inputTextarea value="#{addPAYBean.certification}" rows="2" style="width: 100%; height: 50px;"/>
                                                                        </td>
                                                                    </tr>
                                                                </tbody>
                                                            </table>
                                                            <br/>
                                                            <br/>
                                                            <table border="0" width="100%">
                                                                <tbody>
                                                                    <tr>
                                                                        <td width="45%">
                                                                            <h:panelGrid columns="3" cellpadding="0" cellspacing="3">
                                                                                <p:outputLabel value="CERTIFIED BY"/>
                                                                                <p:outputLabel value="&nbsp;:&nbsp;"/>
                                                                                <p:inputText   value="#{addPAYBean.certify2}"/>
                                                                                <p:outputLabel value="Designation"/>
                                                                                <p:outputLabel value="&nbsp;:&nbsp;"/>
                                                                                <p:inputText   value="#{addPAYBean.rank2}"/>
                                                                            </h:panelGrid>                                
                                                                        </td>
                                                                        <td style="text-align: justify; font-size: 11px; color: blue;" valign="top">
                                                                            <p:outputLabel value="1. HEREBY CERTIFY that each person whose name appears on this roll rendered service as indicated and for the time stated."/>
                                                                            <br/>
                                                                            <p:outputLabel id="labeled" value="#{addPAYBean.render ? '&nbsp;&nbsp;&nbsp;This is to certify further that they are entitled to received additional wages.' : ''}"/>
                                                                        </td>
                                                                    </tr>
                                                                </tbody>
                                                            </table>
                                                            <br/>
                                                            <br/>
                                                            <table border="0" width="100%">
                                                                <tbody>
                                                                    <tr>
                                                                        <td width="45%">
                                                                            <h:panelGrid columns="3" cellpadding="0" cellspacing="3">
                                                                                <p:outputLabel value="CERTIFIED BY"/>
                                                                                <p:outputLabel value="&nbsp;:&nbsp;"/>
                                                                                <p:inputText   value="#{addPAYBean.certify3}"/>
                                                                                <p:outputLabel value="Designation"/>
                                                                                <p:outputLabel value="&nbsp;:&nbsp;"/>
                                                                                <p:inputText   value="#{addPAYBean.rank3}"/>
                                                                            </h:panelGrid>                                
                                                                        </td>
                                                                        <td style="text-align: justify; font-size: 11px; color: blue;" valign="top">
                                                                            <p:outputLabel value="2. I CERTIFY that is correct, every person whose name appears hereon rendered service for the time and at the rates stated."/>
                                                                        </td>
                                                                    </tr>
                                                                </tbody>
                                                            </table>
                                                        </td>
                                                        <td valign="bottom">
                                                            <p:commandButton value="Update Officers" actionListener="#{addPAYBean.updateOfficer}" update="msgs" ajax="false"/>
                                                        </td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </p:panel>

                    </h:form>

                </c:if>

                <c:if test="#{onlined.userOnline == null}">
                    <div align="center" style="margin-top: 150px;">
                        <h1 style="font-size: 75px; color: white;">You are not LOG-ON!</h1>
                    </div>
                </c:if>

            </ui:define>

        </ui:composition>

    </body>
</html>
